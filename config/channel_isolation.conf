# Channel Isolation Tuning Example
#
# This config demonstrates how to tune FFT size, channel bandwidth, and
# filter order for better adjacent channel rejection. These settings are
# particularly important when monitoring tightly-spaced channels or when
# a strong nearby transmitter bleeds into a weaker adjacent channel.
#
# === FFT Size and Channel Resolution ===
#
# The FFT bin width determines the frequency resolution of channel extraction:
#
#   bin_width = sample_rate / fft_size
#
# At the default sample_rate=2560000 and fft_size=512:
#   bin_width = 2,560,000 / 512 = 5,000 Hz per bin
#
# A single FFT bin captures energy only within that 5 kHz window. For AM
# airband voice with sidebands extending ±3-4 kHz from the carrier, a
# single 5 kHz bin misses sideband energy and limits audio quality.
#
# Common configurations:
#
#   fft_size  | bin_width (2.56 Msps) | Notes
#   ----------|------------------------|-----------------------------------
#   256       | 10,000 Hz              | Low CPU, poor isolation
#   512       | 5,000 Hz               | Default, adequate for 25 kHz spacing
#   1024      | 2,500 Hz               | Good for 25 kHz, marginal for 8.33 kHz
#   2048      | 1,250 Hz               | Good for 8.33 kHz European spacing
#   4096      | 625 Hz                 | Excellent isolation, higher CPU
#   8192      | 312.5 Hz               | Maximum resolution, significant CPU cost
#
# === Multi-bin Extraction (extract_bins) ===
#
# By default, each channel extracts a single FFT bin. Setting extract_bins
# to 3 or 5 sums adjacent bins (with complex I/Q summation before computing
# magnitude) to capture the full AM channel bandwidth including sidebands.
#
#   extract_bins = 1   (default, carrier-only extraction)
#   extract_bins = 3   (center bin ± 1, captures ~3x bin_width)
#   extract_bins = 5   (center bin ± 2, captures ~5x bin_width)
#
# Example: fft_size=1024 (2500 Hz/bin) with extract_bins=3 captures 7500 Hz,
# covering the full AM voice bandwidth while the Blackman-7 FFT window
# suppresses energy from bins further away.
#
# === Post-FFT Channel Filter (bandwidth + filter_order) ===
#
# The "bandwidth" parameter enables a lowpass filter on the extracted I/Q
# signal at bandwidth/2 Hz. This rejects adjacent channel energy that leaks
# through the FFT extraction.
#
# The "filter_order" parameter (default 2) controls filter steepness:
#
#   filter_order | Rolloff       | Adjacent channel rejection
#   -------------|---------------|---------------------------
#   2            | 12 dB/octave  | Default, gentle rolloff
#   4            | 24 dB/octave  | Good for 25 kHz spacing
#   6            | 36 dB/octave  | Recommended for 8.33 kHz spacing
#
# === Putting It Together ===
#
# For US 25 kHz airband spacing, the defaults work well. For European
# 8.33 kHz spacing, or when a strong transmitter is adjacent to a weak
# one, increase fft_size and use bandwidth + filter_order.

# Larger FFT for finer frequency resolution (2500 Hz bins at 2.56 Msps).
fft_size = 1024;

devices:
({
  type = "rtlsdr";
  index = 0;
  gain = 40;
  centerfreq = 120.0;
  correction = 0;
  channels:
  (
    # --- Example 1: Standard 25 kHz spacing (US) ---
    # With fft_size=1024, each bin is 2500 Hz. Extracting 3 bins captures
    # 7500 Hz of bandwidth centered on the carrier — enough for AM voice.
    # A 4th-order filter at bandwidth=8000 rejects adjacent channel energy.
    {
      freq = 119.5;
      extract_bins = 3;
      bandwidth = 8000;
      filter_order = 4;
      outputs: (
        {
          type = "icecast";
          server = "icecast.server.example.org";
          port = 8080;
          mountpoint = "TWR.mp3";
          name = "Tower";
          genre = "ATC";
          username = "source";
          password = "mypassword";
        }
      );
    },
    # --- Example 2: Tight 8.33 kHz spacing (European) ---
    # Use fft_size=2048 or higher for 8.33 kHz spacing. With 1024, bins are
    # 2500 Hz — extract_bins=3 captures 7500 Hz, just under the 8330 Hz
    # channel spacing. A 6th-order filter provides steep rolloff to reject
    # the adjacent channel only ~800 Hz away from the filter edge.
    {
      freq = 120.225;
      extract_bins = 3;
      bandwidth = 6000;
      filter_order = 6;
      outputs: (
        {
          type = "icecast";
          server = "icecast.server.example.org";
          port = 8080;
          mountpoint = "GND.mp3";
          name = "Ground";
          genre = "ATC";
          username = "source";
          password = "mypassword";
        }
      );
    }
  );
 }
);
